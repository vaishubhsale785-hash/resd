<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AGENT SPECTRUM · Secure Clearance</title>
<link rel="preload" as="image" href="../assets/LoadingScreen.jpg"/>
<link rel="preload" as="image" href="../assets/ForestBg.jpg"/>
<link rel="preload" href="../assets/DeviceVerificationBGM.mp3" as="audio" type="audio/mpeg" crossorigin="anonymous"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-deep: #0A0C12;        /* deep night ops */
  --bg-card: rgba(12, 16, 24, 0.88);
  --accent-gold: #D4AF37;     /* agent badge gold */
  --accent-cyan: #00E5FF;     /* digital scan cyan */
  --green-verified: #2ECC71;
  --red-alert: #E74C3C;
  --border-glow: rgba(0, 229, 255, 0.25);
  --text-primary: #F0F3F8;
  --text-muted: #8892B0;
  --glow-cyan: rgba(0, 229, 255, 0.12);
  --glow-gold: rgba(212, 175, 55, 0.15);
}

html, body {
  min-height: 100%;
  font-family: 'Space Grotesk', monospace, 'Segoe UI', system-ui;
  color: var(--text-primary);
  overflow-x: hidden;
  background-color: #0A0C12;
}

/* cinematic backdrop */
.app-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: #0A0C12 url('../assets/LoadingScreen.jpg') no-repeat center top;
  background-size: cover;
  transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  pointer-events: none;
  filter: brightness(0.7) contrast(1.2);
}
.app-bg.blurred {
  background-image: url('../assets/ForestBg.jpg');
  filter: brightness(0.55) blur(2px);
}

/* SPLASH — AGENT INIT */
.splash-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 90px;
  background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.7), rgba(2,10,18,0.95));
}
.splash-loader {
  width: 86%;
  max-width: 380px;
  background: rgba(6, 10, 18, 0.85);
  border: 1.2px solid var(--accent-cyan);
  border-radius: 28px;
  padding: 24px 20px;
  backdrop-filter: blur(14px);
  box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.1);
}
.splash-progress {
  width: 100%;
  height: 6px;
  background: #1F2937;
  border-radius: 40px;
  overflow: hidden;
  margin-bottom: 12px;
}
.splash-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-gold));
  border-radius: 40px;
  transition: width 0.3s ease;
  box-shadow: 0 0 8px var(--accent-cyan);
}
.splash-text {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-cyan);
  text-align: center;
  margin-top: 8px;
}
.splash-pct {
  font-size: 13px;
  font-weight: 800;
  color: white;
  text-align: center;
  margin-top: 6px;
  font-family: monospace;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 460px;
  margin: 0 auto;
  padding: 20px 18px 40px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 100vh;
}

/* top bar – agent dossier */
.tbar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-card);
  border: 1px solid rgba(0, 229, 255, 0.3);
  border-radius: 60px;
  padding: 10px 16px 10px 12px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.user-chip {
  display: flex;
  align-items: center;
  gap: 12px;
}
.uc-av {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--accent-gold);
  background: rgba(212, 175, 55, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent-gold);
  box-shadow: 0 0 12px var(--glow-gold);
}
.uc-name {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.2px;
}
.uc-id {
  font-size: 9px;
  color: var(--text-muted);
  font-family: monospace;
}
.status-pill {
  padding: 5px 14px;
  border-radius: 40px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1.2px;
  border: 1px solid;
  text-transform: uppercase;
  background: rgba(0,0,0,0.4);
}
.status-pill.scanning {
  color: var(--accent-cyan);
  border-color: rgba(0, 229, 255, 0.5);
  box-shadow: 0 0 6px var(--accent-cyan);
}
.status-pill.active {
  color: var(--green-verified);
  border-color: rgba(46, 204, 113, 0.5);
}
.sp-dot {
  width: 7px;
  height: 7px;
  background: #2ECC71;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse-green 1.4s infinite;
}
@keyframes pulse-green {
  0% { opacity: 0.3; box-shadow: 0 0 0px #2ECC71; }
  100% { opacity: 1; box-shadow: 0 0 8px #2ECC71; }
}

/* main clearance card */
.card {
  background: var(--bg-card);
  border: 1.5px solid var(--accent-cyan);
  border-radius: 32px;
  padding: 32px 22px;
  backdrop-filter: blur(16px);
  box-shadow: 0 25px 40px -12px black, 0 0 0 1px rgba(0,229,255,0.1);
  transition: all 0.3s;
}

/* DECRYPTOR GEOMETRY – AGENT SCANNER */
.decryptor-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 24px auto;
  display: flex;
  align-items: center;
  justify-content: center;
}
.decryptor-svg {
  width: 100%;
  height: 100%;
  position: absolute;
  filter: drop-shadow(0 0 6px var(--accent-cyan));
}
.dec-outer {
  transform-origin: 50px 50px;
  animation: spinCW 18s linear infinite;
}
.dec-hex {
  transform-origin: 50px 50px;
  animation: spinCCW 12s linear infinite;
  stroke: var(--accent-gold);
  stroke-dasharray: 5,5;
}
.dec-inner {
  transform-origin: 50px 50px;
  animation: pulseRing 2.2s ease-in-out infinite;
}
.dec-sweep {
  transform-origin: 50px 50px;
  animation: spinCW 2.8s linear infinite;
  stroke: var(--accent-cyan);
  stroke-width: 2;
}
@keyframes spinCW { to { transform: rotate(360deg); } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }
@keyframes pulseRing {
  0%, 100% { r: 24px; opacity: 0.2; }
  50% { r: 32px; opacity: 0.6; stroke: var(--accent-cyan); }
}
.dec-core {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: rgba(0, 20, 30, 0.8);
  border: 1.2px solid var(--accent-cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  box-shadow: 0 0 15px rgba(0,229,255,0.3);
}
.core-icon {
  width: 26px;
  height: 26px;
  stroke: var(--accent-cyan);
  fill: none;
  stroke-width: 1.8;
}
.scan-title {
  font-size: 24px;
  font-weight: 900;
  text-align: center;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #FFF, var(--accent-cyan));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
}
.scan-sub {
  font-size: 12px;
  text-align: center;
  color: var(--text-muted);
  margin-bottom: 28px;
}
.prog-bar {
  width: 100%;
  height: 5px;
  background: #1e2a36;
  border-radius: 10px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-gold));
  width: 0%;
  transition: width 0.5s ease;
}
.prog-row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}
.prog-lbl, .prog-pct {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--accent-cyan);
}

/* terminal console – secure channel */
.console-box {
  margin-top: 24px;
  background: #03070F;
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 16px;
  overflow: hidden;
}
.console-header {
  background: #0B111A;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(0,229,255,0.2);
}
.c-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
}
.c-dot.red { background: #FF5F56; }
.c-dot.amber { background: #FFBD2E; }
.c-dot.green { background: #27C93F; }
.c-title {
  font-size: 9px;
  font-weight: 700;
  color: #6C86A3;
  letter-spacing: 1px;
  margin-left: 5px;
}
.console-body {
  padding: 12px;
  height: 94px;
  overflow-y: auto;
  font-family: 'Courier New', monospace;
  font-size: 9px;
  background: #03070F;
}
.log-line {
  color: #8EEDFF;
  padding: 2px 0;
  border-left: 2px solid transparent;
}
.log-line.error { color: #FF6B6B; border-left-color: #FF3B30; }
.log-line.success { color: #6FCF97; }
.log-line.warn { color: #F2C94C; }

/* SUCCESS – EXFILTRATION */
.success-wrap {
  display: none;
  text-align: center;
}
.success-core {
  width: 64px;
  height: 64px;
  background: rgba(46,204,113,0.1);
  border: 1.5px solid var(--green-verified);
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: popIn 0.5s cubic-bezier(0.34,1.2,0.64,1);
}
.success-core-icon {
  width: 32px;
  height: 32px;
  stroke: var(--green-verified);
  stroke-width: 2.5;
  fill: none;
}
.success-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--green-verified);
}
.success-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* CHANNEL GRID – AGENT NETWORK */
.ch-area {
  display: none;
  margin-top: 16px;
}
.ch-lbl {
  text-align: center;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 2.5px;
  color: var(--accent-cyan);
  margin-bottom: 18px;
}
.ch-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.ch-item {
  background: rgba(0,20,28,0.6);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 22px;
  padding: 14px 6px;
  text-align: center;
  text-decoration: none;
  transition: 0.2s;
  position: relative;
}
.ch-item:hover {
  border-color: var(--accent-gold);
  background: rgba(212,175,55,0.05);
}
.ch-item.joined {
  border-color: var(--green-verified);
  background: rgba(46,204,113,0.05);
}
.ch-jbadge {
  position: absolute;
  top: 8px;
  right: 10px;
  background: var(--green-verified);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
.ch-item.joined .ch-jbadge { display: flex; }
.ch-jbadge svg {
  width: 10px;
  stroke: #000;
  stroke-width: 3;
}
.ch-ico svg {
  width: 22px;
  stroke: var(--accent-cyan);
  fill: none;
  stroke-width: 1.6;
}
.ch-name {
  font-weight: 700;
  font-size: 11px;
  margin-top: 8px;
}
.ch-st {
  font-size: 9px;
  color: var(--text-muted);
}
.ch-item.joined .ch-st { color: var(--green-verified); }

/* primary action buttons */
.vbtn, .open-btn {
  width: 100%;
  padding: 14px 12px;
  border-radius: 60px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-size: 12px;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}
.vbtn {
  background: linear-gradient(105deg, #0C1E28, #0A1620);
  border: 1px solid var(--accent-cyan);
  color: var(--accent-cyan);
  box-shadow: 0 4px 12px rgba(0,229,255,0.2);
}
.vbtn:active { transform: scale(0.97); }
.open-btn {
  background: linear-gradient(95deg, #1F3A3F, #0F262E);
  border: 1px solid var(--green-verified);
  color: white;
  display: none;
}

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-90px);
  background: #0E1722;
  border-left: 4px solid var(--accent-cyan);
  border-radius: 50px;
  padding: 10px 22px;
  font-weight: 600;
  font-size: 12px;
  z-index: 9999;
  backdrop-filter: blur(20px);
  transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app-bg" id="appBg"></div>

<div class="splash-screen" id="splashScreen">
  <div class="splash-loader">
    <div class="splash-progress"><div class="splash-progress-fill" id="splashFill"></div></div>
    <div class="splash-text" id="splashText">🔒 INITIATING SECURE PROTOCOL</div>
    <div class="splash-pct" id="splashPct">0%</div>
  </div>
</div>

<div class="wrap" id="verifyWrap" style="display: none;">
  <div class="tbar">
    <div class="user-chip">
      <div class="uc-av" id="ucAv">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" fill="none"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div>
        <div class="uc-name" id="ucName">FIELD AGENT</div>
        <div class="uc-id" id="ucId">ID: —</div>
      </div>
    </div>
    <div class="status-pill scanning" id="statusPill">🔍 SCANNING</div>
  </div>

  <div class="card">
    <!-- SCANNING STATE -->
    <div class="scan-wrap" id="scanWrap">
      <div class="decryptor-wrap">
        <svg class="decryptor-svg" viewBox="0 0 100 100">
          <circle class="dec-outer" cx="50" cy="50" r="44" stroke="#00E5FF" stroke-width="1.2" stroke-dasharray="6 4" fill="none"/>
          <polygon class="dec-hex" points="50,12 83,31 83,69 50,88 17,69 17,31" stroke="#D4AF37" stroke-width="1.2" fill="none"/>
          <circle class="dec-inner" cx="50" cy="50" r="26" stroke="rgba(0,229,255,0.4)" stroke-width="1" fill="none"/>
          <line class="dec-sweep" x1="50" y1="50" x2="50" y2="8" stroke="#00E5FF" stroke-width="2.2"/>
        </svg>
        <div class="dec-core">
          <svg viewBox="0 0 24 24" class="core-icon"><path d="M12 2v7M8 5h8M4 11h16v10H4z"/><circle cx="12" cy="17" r="1.5"/></svg>
        </div>
      </div>
      <div class="scan-title" id="scanTitle">DEEP SCAN</div>
      <div class="scan-sub" id="scanSub">🔐 Verifying device credentials</div>
      <div class="prog-bar"><div class="prog-fill" id="pBar"></div></div>
      <div class="prog-row"><div class="prog-lbl" id="pLbl">HANDSHAKE</div><div class="prog-pct" id="pPct">0%</div></div>
      <div class="console-box">
        <div class="console-header"><span class="c-dot red"></span><span class="c-dot amber"></span><span class="c-dot green"></span><span class="c-title">AGENT TERMINAL v2.4</span></div>
        <div class="console-body" id="consoleLogs"><div class="log-line">> SECURE GATEWAY READY</div></div>
      </div>
    </div>

    <div class="success-wrap" id="successWrap">
      <div class="success-core"><svg class="success-core-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="success-title">ACCESS GRANTED</div>
      <div class="success-sub">Clearance verified. Redirecting to command center...</div>
    </div>

    <div class="ch-area" id="chArea">
      <div class="ch-lbl">⚡ REQUIRED NETWORKS</div>
      <div class="ch-grid" id="chGrid"></div>
      <button class="vbtn" id="vBtn"><svg width="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> VERIFY CREDENTIALS</button>
    </div>
    <button class="open-btn" id="openBtn"><svg viewBox="0 0 24 24" fill="none" stroke="white"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> ENTER MINI APP</button>
  </div>
</div>

<div class="toast" id="toastMsg"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }
const API = '../spinmax-api/';
const params = new URLSearchParams(location.search);
const tgUser = tg?.initDataUnsafe?.user;
const chatId = tgUser?.id || params.get('chat_id') || null;
const initData = tg?.initData || '';
const ref = tg?.initDataUnsafe?.start_param || params.get('ref') || '';

let deviceId = localStorage.getItem('agent_device_fpr');
if(!deviceId){
  deviceId = 'agn_' + Math.random().toString(36).substring(2,12) + Date.now().toString(36);
  localStorage.setItem('agent_device_fpr', deviceId);
}

// set agent profile
if(tgUser){
  document.getElementById('ucName').innerHTML = `🎖️ ${tgUser.first_name || 'Agent'}`;
  document.getElementById('ucId').innerHTML = `ID: ${tgUser.id}`;
}

function toastMsg(msg, type=''){
  const el = document.getElementById('toastMsg');
  el.innerText = msg;
  el.className = 'toast show';
  if(type === 'err') el.style.borderLeftColor = '#E74C3C';
  else el.style.borderLeftColor = '#00E5FF';
  clearTimeout(el._tm);
  el._tm = setTimeout(()=> el.classList.remove('show'), 2600);
}

function addLog(msg, type=''){
  const box = document.getElementById('consoleLogs');
  if(!box) return;
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.innerText = `> ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function setProgress(pct, label){
  const pBar = document.getElementById('pBar');
  const pPct = document.getElementById('pPct');
  const pLbl = document.getElementById('pLbl');
  if(pBar) pBar.style.width = pct+'%';
  if(pPct) pPct.innerText = pct+'%';
  if(label && pLbl) pLbl.innerText = label;
  const splashFill = document.getElementById('splashFill');
  const splashPct = document.getElementById('splashPct');
  const splashTxt = document.getElementById('splashText');
  if(splashFill) splashFill.style.width = pct+'%';
  if(splashPct) splashPct.innerText = pct+'%';
  if(splashTxt && label) splashTxt.innerText = label;
}

function setScanState(title, sub){
  if(title) document.getElementById('scanTitle').innerText = title;
  if(sub) document.getElementById('scanSub').innerText = sub;
}

async function showSuccessAgent(){
  const splashScreen = document.getElementById('splashScreen');
  if(splashScreen && splashScreen.style.display !== 'none'){
    document.getElementById('splashText').innerText = "✅ CLEARANCE APPROVED";
    await new Promise(r=>setTimeout(r,800));
    location.href = '../miniapp/';
    return;
  }
  document.getElementById('scanWrap').style.display = 'none';
  document.getElementById('successWrap').style.display = 'block';
  document.getElementById('statusPill').innerHTML = '<span class="sp-dot"></span>ACTIVE';
  document.getElementById('statusPill').classList.add('active');
  setTimeout(()=>{ location.href = '../miniapp/'; }, 1400);
}

function buildChannelsList(channels){
  const splash = document.getElementById('splashScreen');
  if(splash) splash.style.display = 'none';
  document.getElementById('verifyWrap').style.display = 'flex';
  document.getElementById('appBg').classList.add('blurred');
  const area = document.getElementById('chArea');
  area.style.display = 'block';
  document.getElementById('scanWrap').style.display = 'none';
  const statusPill = document.getElementById('statusPill');
  statusPill.className = 'status-pill scanning';
  statusPill.innerText = '⏳ PENDING';
  
  const grid = document.getElementById('chGrid');
  grid.innerHTML = (channels || []).map(ch => {
    const requiredBadge = ch.is_boss || ch.is_checked ? '🔒 REQUIRED' : '📡 CHANNEL';
    return `<a class="ch-item ${ch.joined ? 'joined' : ''}" href="${ch.url || '#'}" target="_blank">
      <div class="ch-jbadge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="ch-ico"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></div>
      <div class="ch-name">${ch.name || 'Secure Channel'}</div>
      <div class="ch-st">${ch.joined ? '✓ JOINED' : requiredBadge}</div>
    </a>`;
  }).join('');
}

async function runClearance(){
  setProgress(12, 'AUTHENTICATING');
  setScanState('AGENT VERIFICATION', 'Validating webapp session...');
  addLog('establishing encrypted tunnel', '');
  await new Promise(r=>setTimeout(r,400));
  if(!chatId){
    setScanState('ACCESS DENIED', 'No Telegram credentials');
    toastMsg('Launch from bot', 'err');
    return;
  }
  addLog(`subject ID: ${chatId}`, 'success');
  setProgress(38, 'FINGERPRINT SCAN');
  setScanState('DEVICE ATTESTATION', 'reading secure enclave');
  await new Promise(r=>setTimeout(r,350));
  addLog('device fingerprint validated', 'success');
  setProgress(70, 'QUERYING DATABASE');
  setScanState('CLEARANCE DB', 'fetching membership matrix');
  addLog('contacting central server', '');
  await new Promise(r=>setTimeout(r,400));
  try{
    const res = await fetch(API+'verify/check', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData, ref, deviceId, chat_id: chatId})
    });
    const data = await res.json();
    setProgress(95, 'FINAL VALIDATION');
    addLog('server handshake completed', 'success');
    await new Promise(r=>setTimeout(r,200));
    if(data.success === false){
      addLog(`error: ${data.error || 'remote rejection'}`, 'error');
      toastMsg(data.error || 'verification failed', 'err');
      return;
    }
    if(data.banned){
      addLog('BANNED: your credentials are flagged', 'error');
      toastMsg('Agent blacklisted', 'err');
      return;
    }
    if(data.all_verified){
      addLog('✨ full clearance granted', 'success');
      setProgress(100, 'ACCESS ALLOWED');
      await new Promise(r=>setTimeout(r,400));
      showSuccessAgent();
    } else {
      addLog('⚠️ pending channels: join to complete clearance', 'warn');
      setProgress(100, 'ACTION REQUIRED');
      buildChannelsList(data.channels || []);
    }
  } catch(err){
    addLog('fallback: offline clearance protocol engaged', 'success');
    setProgress(100, 'OFFLINE MODE GRANTED');
    await new Promise(r=>setTimeout(r,400));
    showSuccessAgent();
  }
}

async function doVerify(){
  const btn = document.getElementById('vBtn');
  if(btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid #00E5FF;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;"></span> VERIFYING...';
  addLog('re-checking membership status...', '');
  try{
    const resp = await fetch(API+'verify/check', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id: chatId, ref, initData, deviceId})
    });
    const d = await resp.json();
    if(d.success === false){
      addLog(d.error || 'server verification declined', 'error');
      toastMsg(d.error || 'failed', 'err');
      btn.innerHTML = '<svg width="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> VERIFY CREDENTIALS';
      btn.disabled = false;
      return;
    }
    if(d.all_verified){
      document.getElementById('chArea').style.display = 'none';
      addLog('✓ all required networks joined', 'success');
      toastMsg('Clearance confirmed', 'ok');
      showSuccessAgent();
    } else {
      addLog('missing required channels – join first', 'error');
      toastMsg('join all required channels', 'err');
      btn.innerHTML = '<svg width="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> VERIFY CREDENTIALS';
      btn.disabled = false;
      if(d.channels) buildChannelsList(d.channels);
    }
  } catch(e){
    addLog('network error during verification', 'error');
    toastMsg('connection failed', 'err');
    btn.innerHTML = 'VERIFY CREDENTIALS';
    btn.disabled = false;
  }
}

function openApp(){ location.href = '../miniapp/'; }

// BGM + click FX
const getAsset = (p) => {
  const parts = location.pathname.split('/');
  if(parts[parts.length-1] === 'index.html') parts.pop();
  parts.pop();
  const base = parts.join('/');
  return location.origin + base + '/' + p;
};
const bgm = new Audio(getAsset('assets/DeviceVerificationBGM.mp3'));
bgm.loop = true; bgm.volume = 0.22; bgm.load();
let audioCtx = null;
let bgmStarted = false;
function initAudio(){ try{ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }catch(e){} }
function startBGM(){ if(bgmStarted) return; bgmStarted=true; initAudio(); bgm.play().catch(e=>console.log); }
document.addEventListener('click', startBGM, {once:true});
document.addEventListener('touchstart', startBGM, {once:true});
function playMetalClick(){
  try{ if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state==='suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 880;
    gain.gain.value = 0.08;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.1); osc.stop(audioCtx.currentTime+0.1);
  }catch(e){}
}
document.addEventListener('click', (e)=>{ if(e.target.closest('button')||e.target.closest('.ch-item')) playMetalClick(); });
runClearance();
